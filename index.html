<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت الصيانة</title>
    <!-- Google Fonts: Cairo for beautiful Arabic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #fcba03;
            /* A warm golden yellow for better contrast */
            --secondary: #ff8c00;
            /* Deep orange */
            --bg-dark: #121212;
            /* Softer dark background */
            --bg-darker: #000000;
            /* True black */
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-darker);
            background: radial-gradient(circle at top right, var(--bg-dark), var(--bg-darker));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing orbs for modern dark look */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.4;
            animation: float 10s ease-in-out infinite alternate;
        }

        .orb-1 {
            background: var(--primary);
            width: 300px;
            height: 300px;
            top: -10%;
            right: -5%;
        }

        .orb-2 {
            background: var(--secondary);
            width: 400px;
            height: 400px;
            bottom: -15%;
            left: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        /* Main card styling with glassmorphism */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3rem 4rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            /* Entrance animation */
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Animated icon */
        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
                box-shadow: 0 0 40px rgba(0, 210, 255, 0.5);
            }
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: #fff;
        }

        /* Typography */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to left, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.message {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        /* Call to action section */
        .tracking-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            margin-top: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .tracking-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 210, 255, 0.2);
        }

        .tracking-text {
            font-size: 1.05rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
            color: #fff;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem 1rem;
                width: 95%;
                border-radius: 16px;
            }

            .orb {
                display: none;
                /* Hide heavy blurred orbs on mobile to improve performance and view */
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            p.message {
                font-size: 0.95rem;
                margin-bottom: 1.5rem;
            }

            .icon-wrapper {
                width: 60px;
                height: 60px;
                margin-bottom: 1rem;
            }

            .icon-wrapper svg {
                width: 30px;
                height: 30px;
            }

            .tracking-box {
                padding: 1.5rem 1rem;
            }

            .tracking-text {
                font-size: 0.9rem;
            }

            .btn {
                width: 100%;
                padding: 0.8rem 1rem;
                font-size: 1rem;
                box-sizing: border-box;
                display: block;
                /* Ensure it takes full width properly */
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="container">
        <div class="icon-wrapper">
            <!-- Maintenance Gear Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>

        <h2>الموقع حاليًا تحت الصيانة</h2>
        <p class="message">
            <span class="highlight">7 أيام</span> لتطوير الخدمة.
        </p>

        <div class="tracking-box">
            <p class="tracking-text">
                يمكنكم متابعة الشحن بسهولة
            </p>
            <a href="https://ocean67.com" class="btn" target="_blank" rel="noopener noreferrer">عبر متجر أوشن</a>
        </div>
    </main>
</body>

</html>
